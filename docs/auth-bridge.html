<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berth - Signing in...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0a0a0a;
      color: #e5e5e5;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
    p { color: #999; font-size: 0.875rem; margin: 0.25rem 0; }
    a { color: #3b82f6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .error { color: #ef4444; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Redirecting to Berth...</h1>
    <p>You should be redirected to the app automatically.</p>
    <p id="manual" style="display:none"><small>If nothing happened, <a id="link" href="#">click here to open Berth</a>.</small></p>
    <p class="error" id="error">Could not extract authentication tokens from the URL.</p>
  </div>
  <script>
    (function() {
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var access = params.get('access_token');
      var refresh = params.get('refresh_token');

      if (access && refresh) {
        var deepLink = 'berth://auth/callback?access_token=' +
          encodeURIComponent(access) + '&refresh_token=' + encodeURIComponent(refresh);

        document.getElementById('link').href = deepLink;

        // Try redirect
        window.location.href = deepLink;

        // Show manual link after a short delay
        setTimeout(function() {
          document.getElementById('manual').style.display = 'block';
        }, 2000);
      } else {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
