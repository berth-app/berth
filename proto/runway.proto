syntax = "proto3";

package runway;

// Agent service — communication between Runway app and remote agents.
// Phase 1: defined but not implemented (direct runway-core calls for local execution).
// Phase 3: agent runs this as a gRPC server.

service AgentService {
  // Deploy source code to the agent (build container or setup environment)
  rpc Deploy(DeployRequest) returns (stream DeployResponse);

  // Execute a project on the agent
  rpc Execute(ExecuteRequest) returns (stream ExecuteResponse);

  // Get agent and project status
  rpc Status(StatusRequest) returns (StatusResponse);

  // Stream logs from a running project
  rpc StreamLogs(LogStreamRequest) returns (stream LogStreamResponse);

  // Stop a running project
  rpc Stop(StopRequest) returns (StopResponse);

  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);

  // --- Persistent agent RPCs ---

  // Query execution history
  rpc GetExecutions(GetExecutionsRequest) returns (GetExecutionsResponse);

  // Stream stored execution logs (supports catch-up via since_seq)
  rpc GetExecutionLogs(GetExecutionLogsRequest) returns (stream LogStreamResponse);

  // Poll for events (store-and-forward)
  rpc GetEvents(GetEventsRequest) returns (GetEventsResponse);

  // Acknowledge events (allows pruning)
  rpc AckEvents(AckEventsRequest) returns (AckEventsResponse);

  // Add a schedule on the agent
  rpc AddSchedule(AddScheduleRequest) returns (AddScheduleResponse);

  // Remove a schedule from the agent
  rpc RemoveSchedule(RemoveScheduleRequest) returns (RemoveScheduleResponse);

  // List schedules on the agent
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);

  // Upgrade the agent binary (client-streaming)
  rpc Upgrade(stream UpgradeChunk) returns (UpgradeResponse);

  // Rollback to previous agent binary
  rpc Rollback(RollbackRequest) returns (RollbackResponse);
}

// Deploy source code and build container image or setup environment
message DeployRequest {
  string project_id = 1;
  string runtime = 2;
  string entrypoint = 3;
  bytes source_archive = 4;       // tar.gz of project directory
  string containerfile = 5;       // auto-generated or user Containerfile (empty = bare process setup)
  uint32 version = 6;
  repeated string setup_commands = 7; // for bare-process: ["python3 -m venv .venv", "pip install -r requirements.txt"]
}

message DeployResponse {
  string phase = 1;               // "extracting", "building", "setup", "ready", "error"
  string text = 2;
  string timestamp = 3;
  string image_tag = 4;           // set on "ready" if container build
  uint32 version = 5;
  bool is_final = 6;
  bool success = 7;
}

message ExecuteRequest {
  string project_id = 1;
  string runtime = 2;
  string entrypoint = 3;
  bytes code = 4;                 // DEPRECATED: kept for backward compat
  string working_dir = 5;
  string image_tag = 6;           // non-empty = podman run; empty = bare process
  map<string, string> env_vars = 7;
  string container_name = 8;      // for podman --name
}

message ExecuteResponse {
  string stream = 1; // "stdout" or "stderr"
  string text = 2;
  string timestamp = 3;
  int32 exit_code = 4;
  bool is_final = 5; // true on the last message, which carries the exit code
}

message StatusRequest {
  string project_id = 1; // Empty = agent-level status
}

message StatusResponse {
  string agent_id = 1;
  string status = 2; // "idle", "running", "error"
  double cpu_usage = 3;
  uint64 memory_bytes = 4;
  repeated ProjectStatus projects = 5;
}

message ProjectStatus {
  string project_id = 1;
  string status = 2;
  int32 pid = 3;
  string started_at = 4;
}

message LogStreamRequest {
  string project_id = 1;
  bool follow = 2;
  int32 tail_lines = 3; // 0 = all
}

message LogStreamResponse {
  string stream = 1;
  string text = 2;
  string timestamp = 3;
}

message StopRequest {
  string project_id = 1;
}

message StopResponse {
  bool success = 1;
  string message = 2;
}

message HealthRequest {}

message HealthResponse {
  string agent_version = 1;
  string status = 2;
  uint64 uptime_seconds = 3;
  string podman_version = 4;      // empty if not installed
  bool container_ready = 5;       // true if podman is available
  string os = 6;                  // e.g. "linux", "macos"
  string arch = 7;                // e.g. "x86_64", "aarch64"
  string probation_status = 8;    // "", "in_probation", "passed", "rolled_back"
}

// --- Persistent agent messages ---

message GetExecutionsRequest {
  string project_id = 1;         // empty = all projects
  uint32 limit = 2;              // 0 = default (50)
}

message ExecutionInfo {
  string id = 1;
  string project_id = 2;
  string deployment_id = 3;
  string started_at = 4;
  string finished_at = 5;
  int32 exit_code = 6;
  string trigger = 7;            // "manual", "schedule"
  string status = 8;             // "running", "completed", "failed", "stopped"
}

message GetExecutionsResponse {
  repeated ExecutionInfo executions = 1;
}

message GetExecutionLogsRequest {
  string execution_id = 1;
  int64 since_seq = 2;           // 0 = from beginning
}

message GetEventsRequest {
  int64 since_id = 1;            // 0 = from beginning
  uint32 limit = 2;              // 0 = default (100)
}

message AgentEvent {
  int64 id = 1;
  string event_type = 2;         // "deploy_completed", "execution_completed", "schedule_triggered", "agent_upgraded"
  string project_id = 3;
  string execution_id = 4;
  string data = 5;               // JSON payload
  string created_at = 6;
}

message GetEventsResponse {
  repeated AgentEvent events = 1;
}

message AckEventsRequest {
  int64 up_to_id = 1;
}

message AckEventsResponse {
  int64 pruned_count = 1;
}

message AddScheduleRequest {
  string project_id = 1;
  string cron_expr = 2;
}

message AddScheduleResponse {
  string schedule_id = 1;
  string next_run_at = 2;
}

message RemoveScheduleRequest {
  string schedule_id = 1;
}

message RemoveScheduleResponse {
  bool success = 1;
}

message ListSchedulesRequest {
  string project_id = 1;         // empty = all
}

message AgentScheduleInfo {
  string id = 1;
  string project_id = 2;
  string cron_expr = 3;
  bool enabled = 4;
  string created_at = 5;
  string last_triggered_at = 6;
  string next_run_at = 7;
}

message ListSchedulesResponse {
  repeated AgentScheduleInfo schedules = 1;
}

message UpgradeChunk {
  bytes data = 1;
  uint64 total_size = 2;         // set on first chunk
}

message UpgradeResponse {
  bool success = 1;
  string new_version = 2;
  string message = 3;
}

message RollbackRequest {}

message RollbackResponse {
  bool success = 1;
  string restored_version = 2;
  string message = 3;
}
