name: Release Agent

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: berth-agent-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            asset: berth-agent-linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build berth-agent
        run: cross build --release --target ${{ matrix.target }} -p berth-agent

      - name: Rename binary and compute checksum
        run: |
          cp target/${{ matrix.target }}/release/berth-agent ${{ matrix.asset }}
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Berth Agent ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/berth-agent-linux-x86_64/berth-agent-linux-x86_64 \
            artifacts/berth-agent-linux-x86_64/berth-agent-linux-x86_64.sha256 \
            artifacts/berth-agent-linux-aarch64/berth-agent-linux-aarch64 \
            artifacts/berth-agent-linux-aarch64/berth-agent-linux-aarch64.sha256
