unresolved_tensions:
  - description: "Tauri's WKWebView scroll physics don't perfectly match native macOS momentum scrolling"
    impact: "medium"
    mitigation: "Use CSS scroll-behavior tuning, test extensively on log viewer. Accept imperfection."
    accepted_by: "founder"
  - description: "Rust learning curve may slow Month 1-2 development"
    impact: "medium"
    mitigation: "Focus Month 1 on React frontend (familiar). Introduce Rust backend incrementally. Prototype in simpler form first."
    accepted_by: "founder"
  - description: "Tauri plugin ecosystem is younger than Electron's"
    impact: "low"
    mitigation: "Core needs (tray, notifications, updater) have stable Tauri plugins. Custom integrations via Rust are straightforward."
    accepted_by: "founder"

synthesis:
  decision: "Build Runway with Tauri 2.0, using React 19 + TypeScript + shadcn/ui for the frontend and Rust (tokio + tonic + axum) for the backend"
  rationale: "Tauri provides the best balance of native macOS feel (~85% of SwiftUI quality), solo dev velocity (web frontend skills transfer), backend correctness (Rust for gRPC/MCP/credentials), resource efficiency (~8MB binary, ~40MB RAM), and cross-platform path (same codebase for Phase 5). The market narrative ('Rust-powered deployment control plane') is strongest for developer tooling in 2026."
  follow_ups:
    - action: "Set up Tauri 2.0 project scaffold with React + TypeScript"
      owner: "founder"
    - action: "Create CSS design tokens matching macOS system colors and materials"
      owner: "founder"
    - action: "Implement basic Rust backend with tonic gRPC client stub"
      owner: "founder"
    - action: "Validate xterm.js integration in Tauri WebView for log viewer"
      owner: "founder"
  alternatives:
    - decision: "Build with SwiftUI (native macOS)"
      rationale_against: "SwiftUI produces the best native feel but is a cross-platform dead end. All UI code is throwaway at Phase 5. grpc-swift is less mature than tonic. Server-side Swift (NIO) is awkward in desktop context for MCP server. Limits addressable market to macOS."
      conditions_for_reconsideration: "If cross-platform is abandoned entirely and Runway commits to Mac-only permanently. Or if Runway reaches sufficient scale (Year 2+) to justify a separate native SwiftUI Mac app alongside Tauri for other platforms."
    - decision: "Build with Electron (Chromium-based)"
      rationale_against: "200MB+ binary, 200MB+ RAM idle. Target users already run multiple Chromium apps. Poor market narrative for developer tools in 2026. No technical advantage over Tauri for this use case."
      conditions_for_reconsideration: "Not recommended under any foreseeable conditions."

